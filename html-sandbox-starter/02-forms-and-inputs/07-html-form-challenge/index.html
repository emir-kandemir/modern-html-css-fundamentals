<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML & CSS Sandbox</title>
  </head>
  <body>
    <header>
      <h1>Apartment Search</h1>
    </header>
    <main>
      <form>
        <!-- Location -->
        <div>
          <label for="location">Location:</label>
          <input type="text" name="location" id="location" />
        </div>
        <br /><br />
        <!-- Monthly Price -->
        <div>
          <label for="monthlyprice">Monthly Price:</label>
          <input
            type="range"
            name="monthlyprice"
            id="monthlyprice"
            min="0"
            max="100"
          />
        </div>
        <br /><br />
        <!-- Number of Bedrooms -->
        <div>
          <label for="bedrooms">Number of Bedrooms:</label>
          <input type="number" name="bedrooms" id="bedrooms" min="1" />
        </div>
        <br /><br />
        <!-- Number of Bathrooms -->
        <div>
          <label for="bathrooms">Number of Bathrooms:</label>
          <input
            type="number"
            name="bathrooms"
            id="bathrooms"
            min="1"
            max="2"
          />
        </div>
        <br /><br />
        <!-- Pets Allowed -->
        <div>
          <label for="pets"
            >Pets Allowed:
            <input type="checkbox" name="pets" id="pets" checked />
          </label>
        </div>
        <br /><br />
        <!-- Date Available -->
        <div>
          <label for="dateAvailable">Available Date:</label>
          <input type="date" name="dateAvailable" id="dateAvailable" />
        </div>
        <br /><br />
        <!-- Submit -->
        <div>
          <input type="submit" value="Submit" />
        </div>
      </form>
    </main>
  </body>
</html>
